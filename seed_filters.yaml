# --- filter_settings: scalar key -> value ---
fit_score_threshold: 60
company_priority_min: "B"
require_visa_sponsorship: false
require_h1b_track_record: false
require_us_location: true
employee_count_min: 0
employee_count_max: null
founded_after_year: null
remote_only: false
generate_cover_letter: true
approval_reminder_hours: 48
approval_poll_interval_minutes: 30
main_pipeline_schedule_times: "08:00,13:00,18:00"
approval_poller_max_consecutive_failures: 3
posted_within_days: 30
pipeline_paused: false
job_log_enabled: true
daily_token_budget: 1.00
monthly_token_budget: 15.00
# Company enrichment (FMP + StartupHub.ai): FMP's free tier is capped at
# 250 requests/day (confirmed via FMP's published pricing page); each
# company costs 1 FMP call (private, no ticker match -- the common case) or
# 2 (publicly traded: search + profile). Cumulative across all of today's
# runs (see app.enrichment.get_enriched_today_count), not a flat per-run cap.
# Raised from 100 to 200/day once live data showed real usage sits well
# under the 2-call worst case -- 0 of the first 7 companies enriched were
# public matches, so realistic cost is closer to 1 call/company. Worst case
# at 200/day is 400 calls (only if every company were public, which this
# startup-heavy company list essentially never produces); realistic usage is
# ~200-220/day, still under FMP's 250 ceiling. StartupHub.ai has no
# published rate limit -- the cap is sized around FMP's confirmed, harder
# constraint instead of guessing at StartupHub's.
daily_enrichment_limit: 200
# app.link_check: re-verifies Beacon jobs app.ingest.detect_closed_jobs
# can't cover (Adzuna-sourced, 78% of Beacon at the time this was built --
# Adzuna's API has no "list all this employer's open jobs" endpoint, so
# closure can't be detected by re-polling). Runs once per main-pipeline
# cycle (3x/day), rechecking the least-recently-checked jobs first, so the
# whole backlog is gradually covered rather than the same jobs rechecked
# repeatedly. Unlike daily_enrichment_limit, this has no external quota to
# respect -- the cap here is purely about not adding excessive latency to
# a single pipeline run (each check is one HTTP request, up to 15s with
# retries). 200/run clears the initial ~1,900-job backlog in about 3 days
# at 3 runs/day, then settles into steady-state (only new jobs + periodic
# re-checks of old ones).
link_check_batch_size: 200
# app.salary_refresh: re-attempts salary extraction via the full posting
# page for jobs still missing a real salary after the cheap description-
# only extraction at add-time (app.sheets.add_job_to_beacon). Real gap
# found live, reported directly: a job's real "$85,000 to $95,000" salary
# line sat past Adzuna's 500-char description cap, so Beacon showed
# Adzuna's unrelated algorithmic estimate instead. No external quota here
# either (same reasoning as link_check_batch_size) -- purely a per-run
# latency cap. Not every job's full page is actually fetchable this way
# (some Adzuna redirects are client-side JS to an external board, which a
# plain HTTP client can't follow) -- those are simply left as they were,
# stamped checked so they aren't retried forever.
salary_refresh_batch_size: 200
# app.cloud_platforms_refresh: re-checks AWS/GCP/Azure mentions via the full
# posting page for jobs whose stored description is truncated (Adzuna's
# 500-char cap). Real gap found live, reported directly: comparing AWS vs
# GCP vs Azure mention counts surfaced that most jobs had no cloud label at
# all -- confirmed 87.8% of Adzuna-sourced jobs on Beacon were truncated to
# exactly 500 characters. Same no-external-quota reasoning as
# link_check_batch_size/salary_refresh_batch_size -- purely a per-run
# latency cap.
cloud_platforms_refresh_batch_size: 200
