  # Blanket career-level exclusion, not a title-collision patch (per direct
  # request: "I cannot take managerial or director roles" -- a visa
  # constraint, not a preference). Substring match (this category's usual
  # rule), so it also catches "Sr. Director", "Director, Product
  # Management", "Engineering Manager", etc. without needing every variant
  # spelled out. Known, accepted collision: "Director" also matches
  # "Directory" (e.g. "...Universal Directory") -- checked live, only one
  # such job exists in the DB and it isn't even on Beacon, so not worth a
  # word-boundary carve-out that would change every other title_exclude
  # term's matching behavior. Supersedes and replaces ~12 narrower
  # Manager/Director-specific terms added earlier this session as one-off
  # patches (Accounting Manager, Business Development Manager, Communications
  # Manager, Creative Director, Account Director, Engineering Manager HADR,
  # GRC Program Manager, Partner Program Director, Sales Manager Enterprise
  # Digital Natives, Sales Strategy and Operations Manager, Strategic
  # Solutions Engineering Director, Technical Program Manager) -- deactivated
  # in the DB (seed-filters is add-only, so removal from this file alone
  # doesn't retroactively deactivate) rather than left redundant.
  - "Director"
  - "Manager"
  # Sales/marketing/customer-facing non-technical titles reported live as not
  # a fit ("Customer Marketing Lead, Account Executive, Inside Sales
  # Representatives, Marketing executive, Market Leader, Service Assistant,
  # VP are not my roles"). Root-caused: every one of these matched purely via
  # tech_keyword_include hitting ordinary company "About Us" boilerplate in
  # the description ("Integration", "iPaaS", "Agentic AI", "AI Gateway"), not
  # a real role match -- 98 "Account Executive" postings alone were live on
  # Beacon this way. Checked all 98 titles individually before excluding:
  # none are hybrid/technical roles, all pure sales.
  - "Account Executive"
  - "Customer Marketing"
  - "Inside Sales Representative"
  - "Inside Sales Rep"
  - "Marketing Executive"
  - "Market Leader"
  - "Service Assistant"
  # "VP" is a blanket career-level exclusion like Director/Manager above
  # (same visa constraint), not a title-collision patch. Checked live for
  # collisions first: AVP/RVP/SVP (all real VP-level variants, correctly
  # also excluded) are the only other titles in the DB containing "VP" --
  # no VPN-type false positive currently exists, though that's a known,
  # accepted future risk of the same kind as "Contract" also catching
  # "Contractor".
  - "VP"
  # "Executive Chef | Cantonese Cuisine" reported live -- root-caused to a
  # real keyword-matching bug, not just a title_exclude gap: tech_keyword_
  # include's "Kong" (the tracked API-gateway company) was matching the
  # place name "Hong Kong" in the description ("...Hong Kong-inspired
  # restaurant..."), unrelated to the company entirely. Fixed at the source
  # in app.filter_engine._contains_any_word (a lookbehind excluding "Kong"
  # immediately preceded by "hong "/"hong-"), which also caught 12 other
  # unrelated jobs live matching the same way. "Chef" added here too as a
  # direct backstop per the report, in case a genuinely chef/culinary
  # posting ever matches some other keyword in the future.
  - "Chef"

